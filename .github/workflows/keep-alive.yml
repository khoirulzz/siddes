name: Keep Alive Render & Aiven

on:
  schedule:
    # Berjalan setiap 10 menit (Render Free tertidur setelah 15 menit tanpa aktivitas)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Memungkinkan kita menjalankan ini secara manual jika dibutuhkan

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Web Aplikasi
        run: |
          # Ganti URL ini dengan URL Render Anda (misalnya https://siddes.onrender.com)
          URL="${{ secrets.RENDER_URL }}"
          
          if [ -z "$URL" ]; then
            echo "RENDER_URL secret belum diatur di GitHub! Menggunakan fallback (harap sesuaikan)."
            URL="https://siddes.onrender.com"
          fi
          
          echo "Melakukan ping ke $URL..."
          curl -sS --max-time 10 "$URL" > /dev/null
          echo "Ping selesai. Render dan Aiven tetap terjaga!"
